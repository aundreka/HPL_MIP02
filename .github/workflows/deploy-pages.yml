name: Deploy To GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PAGES_PAT: ${{ secrets.PAGES_PAT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        id: pages
        continue-on-error: true
        uses: actions/configure-pages@v5

      - name: Enable Pages
        if: ${{ steps.pages.outcome == 'failure' && env.PAGES_PAT != '' }}
        uses: actions/configure-pages@v5
        with:
          enablement: true
          token: ${{ env.PAGES_PAT }}

      - name: Validate Pages Configuration
        if: ${{ steps.pages.outcome == 'failure' && env.PAGES_PAT == '' }}
        run: |
          echo "::error::GitHub Pages is not enabled for this repository."
          echo "::error::In GitHub Settings > Pages, set the source to GitHub Actions, or add a PAGES_PAT secret and rerun this workflow."
          exit 1

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
